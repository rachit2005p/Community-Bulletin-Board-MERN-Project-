# Netlify configuration for frontend deployment
[build]
  # Build command
  command = "npm run build"
  # Directory to publish
  publish = "dist"

[context.production]
  environment = { VITE_API_URL = "https://your-backend.onrender.com/api" }

[context.deploy-preview]
  environment = { VITE_API_URL = "http://localhost:5000/api" }

# Redirect all requests to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache control headers
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"

[[headers]]
  for = "/*.{js,css,png,jpg,jpeg,gif,svg,woff,woff2,ttf,eot}"
  [headers.values]
    Cache-Control = "max-age=31536000, public, immutable"

# Environment variables to set in Netlify dashboard
# VITE_API_URL=https://your-backend-url.onrender.com/api
